<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 应届生求职服务平台</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="bg-animation">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand">
      <div class="logo"><i class="fas fa-rocket"></i></div>
      <span>应届生求职平台</span>
    </a>
    <div class="nav-actions">
      <span style="color:var(--text-secondary);font-size:0.9rem;">已有账号？</span>
      <a href="login.html" class="btn btn-outline btn-sm">登录</a>
    </div>
  </nav>

  <section class="auth-section">
    <div class="auth-card card">
      <div class="auth-header">
        <div class="auth-icon" style="background:linear-gradient(135deg,var(--accent),var(--primary))">
          <i class="fas fa-user-plus"></i>
        </div>
        <h2>创建你的账号</h2>
        <p>免费注册，开启求职之旅</p>
      </div>

      <form class="auth-form" id="registerForm" onsubmit="return handleRegister(event)">
        <div class="form-row">
          <div class="form-group" style="flex:1">
            <label class="form-label" for="regName">姓名</label>
            <div class="input-with-icon">
              <i class="fas fa-user"></i>
              <input type="text" id="regName" class="form-input" placeholder="你的姓名" required>
            </div>
          </div>
          <div class="form-group" style="flex:1">
            <label class="form-label" for="regSchool">学校</label>
            <div class="input-with-icon">
              <i class="fas fa-university"></i>
              <input type="text" id="regSchool" class="form-input" placeholder="毕业院校" required>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="regEmail">邮箱</label>
          <div class="input-with-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" id="regEmail" class="form-input" placeholder="your@email.com" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="regPwd">设置密码</label>
          <div class="input-with-icon">
            <i class="fas fa-lock"></i>
            <input type="password" id="regPwd" class="form-input" placeholder="至少8位，含字母和数字" required minlength="8">
            <button type="button" class="toggle-pwd" onclick="togglePwd(this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="pwd-strength" id="pwdStrength">
            <div class="pwd-bar"><div class="pwd-fill"></div></div>
            <span class="pwd-label">密码强度</span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="regPwdConfirm">确认密码</label>
          <div class="input-with-icon">
            <i class="fas fa-lock"></i>
            <input type="password" id="regPwdConfirm" class="form-input" placeholder="再次输入密码" required>
          </div>
        </div>

        <label class="checkbox-label" style="margin-bottom:var(--space-lg);display:flex;gap:var(--space-sm);font-size:0.85rem;color:var(--text-secondary)">
          <input type="checkbox" id="agreeTerms" required>
          <span class="checkmark"></span>
          我已阅读并同意 <a href="#" style="color:var(--accent)">用户协议</a> 和 <a href="#" style="color:var(--accent)">隐私政策</a>
        </label>

        <button type="submit" class="btn btn-primary btn-lg" style="width:100%">
          <i class="fas fa-user-plus"></i> 注册账号
        </button>
      </form>

      <div class="auth-footer" style="margin-top:var(--space-xl)">
        <span>已有账号？</span>
        <a href="login.html">立即登录 →</a>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
  <script>
    function togglePwd(btn) {
      var input = btn.parentElement.querySelector('input');
      var icon = btn.querySelector('i');
      if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
      else { input.type = 'password'; icon.className = 'fas fa-eye'; }
    }

    // 密码强度检测
    var pwdInput = document.getElementById('regPwd');
    if (pwdInput) {
      pwdInput.addEventListener('input', function() {
        var val = this.value;
        var strength = 0;
        if (val.length >= 8) strength++;
        if (/[a-z]/.test(val) && /[A-Z]/.test(val)) strength++;
        if (/\d/.test(val)) strength++;
        if (/[^a-zA-Z0-9]/.test(val)) strength++;

        var fill = document.querySelector('.pwd-fill');
        var label = document.querySelector('.pwd-label');
        var colors = ['#ef4444', '#f59e0b', '#22c55e', '#00d4ff'];
        var labels = ['弱', '中', '强', '极强'];
        fill.style.width = (strength / 4 * 100) + '%';
        fill.style.background = colors[strength - 1] || 'transparent';
        label.textContent = strength > 0 ? '密码强度：' + labels[strength - 1] : '密码强度';
      });
    }

    function handleRegister(e) {
      e.preventDefault();
      var pwd = document.getElementById('regPwd').value;
      var confirm = document.getElementById('regPwdConfirm').value;
      if (pwd !== confirm) { alert('两次输入的密码不一致！'); return false; }
      var btn = e.target.querySelector('button[type="submit"]');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 注册中...';
      btn.disabled = true;
      setTimeout(function() {
        alert('注册成功！欢迎加入应届生求职平台！');
        window.location.href = 'login.html';
      }, 1500);
      return false;
    }
  </script>
</body>
</html>
