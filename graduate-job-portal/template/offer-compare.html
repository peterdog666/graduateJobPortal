<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offer智能对比 - 应届生求职服务平台</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/offer-compare.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="bg-animation"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>

  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand">
      <div class="logo"><i class="fas fa-rocket"></i></div>
      <span>应届生求职平台</span>
    </a>
    <div class="nav-links" id="navLinks">
      <a href="index.html">首页</a>
      <a href="jobs.html">岗位推荐</a>
      <a href="offer-compare.html" class="active">Offer对比</a>
      <a href="onboarding.html">入职清单</a>
    </div>
    <div class="nav-actions">
      <a href="login.html" class="btn btn-ghost">登录</a>
      <a href="register.html" class="btn btn-primary btn-sm">注册</a>
      <button class="mobile-menu-btn" id="mobileMenuBtn"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <section class="page-hero">
    <div class="container">
      <h1 class="page-title">智能 Offer 对比</h1>
      <p class="page-subtitle">多维度分析，帮你做出最优职业选择</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <!-- 添加Offer按钮 -->
      <div class="oc-controls">
        <button class="btn btn-primary" onclick="addOffer()">
          <i class="fas fa-plus"></i> 添加 Offer
        </button>
        <button class="btn btn-outline" onclick="resetAll()">
          <i class="fas fa-redo"></i> 重置
        </button>
        <div style="flex:1"></div>
        <div style="font-size:0.85rem;color:var(--text-muted)">已添加 <span id="offerCount">0</span>/3 个 Offer</div>
      </div>

      <!-- Offer 输入区 -->
      <div class="oc-cards" id="ocCards">
        <!-- 由JS动态生成 -->
      </div>

      <!-- 对比结果 -->
      <div class="oc-result" id="ocResult" style="display:none">
        <div class="card" style="padding:var(--space-2xl);">
          <h3 style="font-size:1.3rem;margin-bottom:var(--space-xl);text-align:center;">
            <i class="fas fa-chart-bar" style="color:var(--accent);margin-right:8px;"></i>对比结果
          </h3>
          <div class="oc-table-wrap">
            <table class="oc-table" id="ocTable">
              <!-- 由JS动态生成 -->
            </table>
          </div>
          <!-- 推荐结果 -->
          <div class="oc-recommend card" id="ocRecommend" style="margin-top:var(--space-2xl);border:1px solid rgba(0,212,255,0.2);">
            <!-- 由JS动态生成 -->
          </div>
        </div>
      </div>

      <div class="text-center mt-4" id="compareBtnWrap" style="display:none">
        <button class="btn btn-primary btn-lg" onclick="doCompare()">
          <i class="fas fa-balance-scale"></i> 开始对比分析
        </button>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="justify-content:center"><span>© 2025 应届生求职服务平台</span></div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/offer-compare.js"></script>
</body>
</html>
