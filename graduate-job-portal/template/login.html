<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 应届生求职服务平台</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <!-- 背景动画 -->
  <div class="bg-animation">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand">
      <div class="logo"><i class="fas fa-rocket"></i></div>
      <span>应届生求职平台</span>
    </a>
    <div class="nav-actions">
      <span style="color:var(--text-secondary);font-size:0.9rem;">还没有账号？</span>
      <a href="register.html" class="btn btn-primary btn-sm">注册</a>
    </div>
  </nav>

  <!-- 登录表单 -->
  <section class="auth-section">
    <div class="auth-card card">
      <div class="auth-header">
        <div class="auth-icon">
          <i class="fas fa-user-graduate"></i>
        </div>
        <h2>欢迎回来</h2>
        <p>登录你的账号，继续求职之旅</p>
      </div>

      <form class="auth-form" id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="loginEmail">邮箱 / 手机号</label>
          <div class="input-with-icon">
            <i class="fas fa-envelope"></i>
            <input type="text" id="loginEmail" class="form-input" placeholder="请输入邮箱或手机号" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPwd">密码</label>
          <div class="input-with-icon">
            <i class="fas fa-lock"></i>
            <input type="password" id="loginPwd" class="form-input" placeholder="请输入密码" required>
            <button type="button" class="toggle-pwd" onclick="togglePwd(this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe">
            <span class="checkmark"></span>
            记住我
          </label>
          <a href="#" class="forgot-link">忘记密码？</a>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" style="width:100%">
          <i class="fas fa-sign-in-alt"></i> 登录
        </button>
      </form>

      <div class="auth-divider"><span>或使用以下方式登录</span></div>

      <div class="social-login">
        <button class="social-btn" title="微信登录">
          <i class="fab fa-weixin"></i>
        </button>
        <button class="social-btn" title="QQ登录">
          <i class="fab fa-qq"></i>
        </button>
        <button class="social-btn" title="GitHub登录">
          <i class="fab fa-github"></i>
        </button>
      </div>

      <div class="auth-footer">
        <span>还没有账号？</span>
        <a href="register.html">立即注册 →</a>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
  <script>
    function togglePwd(btn) {
      var input = btn.parentElement.querySelector('input');
      var icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
      }
    }

    function handleLogin(e) {
      e.preventDefault();
      var btn = e.target.querySelector('button[type="submit"]');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...';
      btn.disabled = true;
      setTimeout(function() {
        alert('登录成功！欢迎回来！');
        window.location.href = 'index.html';
      }, 1500);
      return false;
    }
  </script>
</body>
</html>
